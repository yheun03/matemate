<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0">
    <meta property="og:url" content="https://matemate.co.kr/" />

    <meta property="og:title" content="MATEMATE" />

    <meta property="og:site_name" content="MATEMATE" />
    <meta property="og:description" content="한국공학대학교 기숙사 메이트 매칭 서비스! MATEMATE" />
    <meta name="twitter:title" content="MATEMATE" />
    <meta name="twitter:description" content="한국공학대학교 기숙사 메이트 매칭 서비스! MATEMATE" />

    <meta name="description" content="한국공학대학교 기숙사 메이트 매칭 서비스! MATEMATE">
    <meta name="keywords" content="한국공학대학교, 기숙사, tip, 제2기숙사, 룸메이트, 긱사메이트, 긱사" />
    <link rel="shortcut icon" href="#">
    <link rel="manifest" href="/src/assets/favicon/manifest.json">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <title>MATEMATE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="/src/assets/css/style.css">
    <script src="/src/assets/scripts/jquery-3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="/src/assets/scripts/common.js"></script>
</head>
<body>
    <div id="root">
        <header></header>
        <section>
            <form action="./successData.html" method="post">
                <div class="swiper">
                    <div class="swiper-pagination"></div>
                    <div class="rm-match-wrap swiper-wrapper">
                        <div class="rm-match-section swiper-slide">
                            <h2 class="title">MATEMATE를
                                <br/>시작해볼까요?
                            </h2>
                            <div></div>
                            <div class="btn-wrap">
                                <button class="btn bg-primary gotoNext full">시작하기</button>
                                <button class="btn bg-secondary full">이미 계정이 있어요</button>
                            </div>
                        </div>
                        <div class="rm-match-section swiper-slide">
                            <h2 class="title">회원가입을
                                <br/>해주세요!
                            </h2>
                            <div></div>
                            <div class="dscpt-information type-warning">
                                <p>1학년만 TIP 생활관 4, 6, 12개월
                                    <br/>제 2 생활관은 6, 12개월만 가능합니다.
                                </p>
                            </div>
                            <div class="btn-wrap">
                                <button class="btn bg-primary full cp-naver">네이버로 시작하기</button>
                            </div>
                        </div>
                        <div class="rm-match-section swiper-slide">
                            <h2 class="title">학교계정으로
                                <br/>재로그인 해주세요!
                            </h2>
                            <div></div>
                            <div class="dscpt-information">
                                <p>학교 계정으로 하지 않으면 로그인이 불가합니다.</p>
                            </div>
                            <div class="btn-wrap">
                                <button class="btn bg-primary full cp-naver">네이버로 시작하기</button>
                            </div>
                        </div>
                        <div class="rm-match-section swiper-slide">
                            <div class="status-noti">
                                <img src="/src/assets/icons/140/ic-success.svg" alt="">
                                <div>
                                    <p class="title">모든 단계가 끝났어요!
                                        <br/>이제 매칭하러 가볼까요?
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="rm-match-section swiper-slide">
                            <div class="status-noti">
                                <img src="/src/assets/icons/140/ic-error.svg" alt="">
                                <div>
                                    <p class="title">인증에 실패했어요</p>
                                    <p class="dscpt">학교 계정이 올바른지 확인해주세요</p>
                                </div>
                            </div>
                        </div>
                        <div class="rm-match-section swiper-slide">
                            <div class="status-noti">
                                <img src="/src/assets/icons/140/ic-error.svg" alt="">
                                <div>
                                    <p class="title">로그인한 정보와
                                        <br/>입력한 <span>성별</span>이 달라요!
                                    </p>
                                    <p class="dscpt">입력한 내용을 삭제 후 다시 입력해주세요!</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </section>
        <footer></footer>
    </div>
</body>
</html>
