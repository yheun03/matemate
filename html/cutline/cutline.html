    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

</head>

<body>
    <div id="root" class="cutline">
        <header>
            <button class="btn ic-arrow-left"></button>
            <h1>커트라인</h1>
        </header>
        <section>
            <div class="formula">
                <p class="title">점수 계산법</p>
                <div>
                    <p>총점 = 학점(85%)+전입신고여부(15%)
                        <br>+직전학기 생활관 상벌점(+-)
                    </p>
                </div>
            </div>
            <div class="cutline-chart">
                <p class="title"><span>TIP 생활관</span> <span>남자</span> 커트라인</p>
                <div class="wrap">
                    <canvas id="tipManChart"></canvas>
                </div>
            </div>
            <div class="cutline-chart">
                <p class="title"><span>TIP 생활관</span> <span>여자</span> 커트라인</p>
                <div class="wrap">
                    <canvas id="tipGirlChart"></canvas>
                </div>
            </div>
        </section>
        <footer></footer>
    </div>
    <script>
        const tipManCtx = document.getElementById('tipManChart').getContext('2d');
        const tipManChart = new Chart(tipManCtx, {
            type: 'bar',
            data: {
                labels: ['23-1\n(1차)', '24-1\n(1차)', '24-1\n(2차)'],
                datasets: [{
                    data: [64.44, 69.29, 66.29],
                    backgroundColor: '#95C0FA',
                    borderColor: '#95C0FA',
                    borderWidth: 1,
                    borderRadius: { topLeft: 5, topRight: 5 },
                    barPercentage: 0.6
                }]
            },
            options: {
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }, // 툴팁 비활성화
                    datalabels: {
                        anchor: 'end',
                        align: 'end',
                        font: {
                            size: 10, // 폰트 크기
                            family: 'Pretendard', // 폰트
                            weight: '600', // 폰트 두께
                            lineHeight: 1.4 // 140%
                        },
                        color: '#000',
                        formatter: function(value) {
                            return value.toFixed(2); // 소수점 2자리
                        },
                        padding: {
                            top: 5 // 값과 막대 사이 여백
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false }, // X축 기준선 숨김
                        ticks: {
                            font: {
                                size: 14,
                                family: 'Pretendard',
                                weight: '600',
                                lineHeight: 1.4
                            },
                            color: '#000',
                            padding: 5,
                            callback: function(value, index, ticks) {
                                const labels = ['23-1\n(1차)', '24-1\n(1차)', '24-1\n(2차)'];
                                return labels[index].split('\n'); // 라벨 개행 처리
                            }
                        }
                    },
                    y: {
                        grid: {
                            display: true,
                            drawBorder: false, // Y축 왼쪽 선 제거
                            color: 'rgba(0,0,0,0)', // 그리드 선 숨김
                        },
                        ticks: { display: false }, // Y축 값 숨김
                        max: 105, // Y축 최대값 설정으로 상단 여유 추가
                        beginAtZero: true
                    }
                },
                layout: {
                    padding: {
                        top: 20, // 상단 여백 추가
                        bottom: 10 // 하단 여백 추가
                    }
                },
                responsive: true,
                maintainAspectRatio: false
            },
            plugins: [ChartDataLabels]
        });

        const tipGirlCtx = document.getElementById('tipGirlChart').getContext('2d');
        const tipGirlChart = new Chart(tipGirlCtx, {
            type: 'bar',
            data: {
                labels: ['23-1\n(1차)', '24-1\n(1차)', '24-1\n(2차)'],
                datasets: [{
                    data: [81.87, 85.78, 64.13],
                    backgroundColor: '#FFD3D6',
                    borderColor: '#FFD3D6',
                    borderWidth: 1,
                    borderRadius: { topLeft: 5, topRight: 5 },
                    barPercentage: 0.6
                }]
            },
            options: {
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false },
                    datalabels: {
                        anchor: 'end',
                        align: 'end',
                        font: {
                            size: 10, // 폰트 크기
                            family: 'Pretendard', // 폰트
                            weight: '600', // 폰트 두께
                            lineHeight: 1.4 // 140%
                        },
                        color: '#000',
                        formatter: function(value) {
                            return value.toFixed(2);
                        },
                        padding: {
                            top: 5 // 값과 막대 사이 여백
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false }, // X축 기준선 숨김
                        ticks: {
                            font: {
                                size: 14,
                                family: 'Pretendard',
                                weight: '600',
                                lineHeight: 1.4
                            },
                            color: '#000',
                            padding: 5,
                            callback: function(value, index, ticks) {
                                const labels = ['23-1\n(1차)', '24-1\n(1차)', '24-1\n(2차)'];
                                return labels[index].split('\n'); // 라벨 개행 처리
                            }
                        }
                    },
                    y: {
                        grid: {
                            display: true,
                            drawBorder: false, // Y축 왼쪽 선 제거
                            color: 'rgba(0,0,0,0)', // 그리드 선 숨김
                        },
                        ticks: { display: false }, // Y축 값 숨김
                        max: 105, // Y축 최대값 설정으로 상단 여유 추가
                        beginAtZero: true
                    }
                },
                layout: {
                    padding: {
                        top: 20, // 상단 여백 추가
                        bottom: 10 // 하단 여백 추가
                    }
                },
                responsive: true,
                maintainAspectRatio: false
            },
            plugins: [ChartDataLabels]
        });
    </script>
</body>
