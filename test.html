<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin: 0; padding: 0; box-sizing: border-box;}
        html, body{width: 100%; height: 100%;}
    </style>
</head>
<body>
    <div style="height: 100%;">
        <div class="custom-calendar" style="position: relative; top: 50%; left: 30%;">클릭해보슈</div>
        <div class="calendar" style="width: 320px; height: 200px; background-color: black; position: fixed;"></div>
    </div>
    <script>
        const target = document.querySelector('.custom-calendar');
        const cal = document.querySelector('.calendar'); // 여기서 `.calendar`로 수정

        target.onclick = () => {
            console.log('offsetTop: ' + target.offsetTop);
            console.log('offsetHeight: ' + target.offsetHeight);
            console.log('offsetLeft: ' + target.offsetLeft);

            cal.style.top = `${target.offsetTop + target.offsetHeight}px`; // px 단위 추가
            cal.style.left = `${target.offsetLeft}px`; // 'Left'를 'left'로 수정
        };
    </script>
</body>
</html>
