    <script>
    $(document).ready(function() {
        let capturedImgData = '';

        // 페이지 로드 시 자동 캡처
        function captureInfoWrap() {
            html2canvas(document.querySelector('.info-wrap')).then(function(canvas) {
                capturedImgData = canvas.toDataURL('image/png');
                $('#result-target').attr('src', capturedImgData);
            });
        }

        // 이미지 다운로드 기능
        $('#download-btn').on('click', function() {
            if (capturedImgData) {
                const link = document.createElement('a');
                link.href = capturedImgData;
                link.download = '체크리스트.png';
                link.click();
            } else {
                alert('이미지가 준비되지 않았습니다.');
            }
        });

        // 페이지 로드 시 자동 실행
        captureInfoWrap();
        document.querySelector('.info-wrap').style.display = "none"
    });
    </script>
