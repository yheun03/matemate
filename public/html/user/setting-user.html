    <meta name="keywords" content="한국공학대학교, 기숙사, tip, 제2기숙사, 룸메이트, 긱사메이트, 긱사" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="../../src/assets/css/style.css">
    <script src="../../src/assets/scripts/jquery-3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="../../src/assets/scripts/common.js" defer></script>
</head>
<body>
    <div id="root">
        <header>
            <button class="btn ic-arrow-left"></button>
            <h1>설정</h1>
        </header>
        <section>
            <div class="updateUser">
                <div>
                    <label>
                        <input type="file" id="fileInput" accept="image/*">
                        <img id="preview" alt="">
                        <span>사진 변경하기</span>
                    </label>
                </div>
                <div class="ipt">
                    <div>
                        <input type="text" placeholder="닉네임 변경">
                    </div>
                    <div>
                        <textarea name="" id="" placeholder="소개글 변경"></textarea>
                    </div>
                </div>
            </div>
        </section>
        <footer>
            <div class="btn-wrap">
                <button class="btn bg-primary ts-20 full">완료</button>
            </div>
        </footer>
    </div>
    <script>
    // 유저 이미지 변경
    window.addEventListener('DOMContentLoaded', function() {
        document.getElementById('fileInput').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const preview = document.getElementById('preview');
                const objectURL = URL.createObjectURL(file);  // 임시 URL 생성
                preview.src = objectURL;

                // 메모리 누수를 방지하기 위해 이미지 로드 후 URL 해제
                preview.onload = function() {
                URL.revokeObjectURL(objectURL);
                };
            } else {
                document.getElementById('preview').src = "";
            }
        });
    });
    </script>
</body>
</html>
